<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container"> 

        <!-- 🔝 Top Section -->
        <div class="top">
            <h1>Quotes</h1>
            <p>Quotes that will inspire and enlighten you.</p>

            <!-- 🌙 Dark Mode Toggle -->
            <button id="toggleTheme">🌙</button>
        </div>

        <!-- 📜 Main Quote Area -->
        <div class="main">
            <div class="quote-area">
                <p id="quote">
                    "Click the button to generate a quote"
                </p>
                <p id="author">
                    - Unknown
                </p>
            </div>
        </div>

        <!-- 🔘 Button -->
        <div class="bottom">
            <button id="btn">Generate new quote</button>
        </div>

        <!-- 👇 Footer -->
        <div class="end">
            <p>Made using Quotes API</p>
        </div>

    </div>

    <!-- ✅ JS at bottom -->
    <script src="app.js"></script>
</body>
</html>
